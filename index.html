<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SFM Wien | Facility Control Hub</title>

    <!-- Essential Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#0056b3', info: '#f8fafc', alert: '#ef4444', success: '#22c55e' },
                    boxShadow: { 'premium': '0 25px 50px -12px rgba(0, 0, 0, 0.1)', 'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.05)' }
                }
            }
        }
    </script>
    
    <!-- QR & Scanner -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- Maps (Leaflet) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;900&family=Inter:wght@400;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #fbfcfd; -webkit-tap-highlight-color: transparent; }
        h1, h2, h3, .heading { font-family: 'Outfit', sans-serif; }
        
        /* Premium Map Animations */
        .leaflet-div-icon { background: transparent; border: none; }
        .pin-green { animation: pulse-green 2s infinite; }
        .pin-red-blink { animation: red-blink 1s infinite; }
        
        @keyframes pulse-green {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 12px rgba(34, 197, 94, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        
        @keyframes red-blink {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 2px red); opacity:1; }
            50% { transform: scale(1.2); filter: drop-shadow(0 0 15px red); opacity:0.7; }
        }

        /* PRINT MASTER CSS - Final Branding Specification */
        @page { size: A4; margin: 15mm; }
        @media print {
            body * { visibility: hidden; }
            #print-report, #print-report * { visibility: visible; }
            #print-report { 
                position: absolute; left: 0; top: 0; width: 100%; display: block !important; 
                padding: 0; margin: 0; background: white; 
            }
            .no-print { display: none !important; }
            table { width: 100%; border-collapse: collapse; margin-top: 25px; table-layout: fixed; }
            th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; font-size: 10px !important; color: #333; }
            th { background: #f8f9fa !important; color: #000; font-weight: bold; }
            
            /* Professional Branded Header */
            .print-header { position: relative; margin-bottom: 40px; border-bottom: 3px solid #0056b3; padding-bottom: 25px; }
            .print-logo-box { position: absolute; top: 0; right: 0; max-width: 180px; }
            #logo-print { max-width: 180px; height: auto; display: block; }
            .print-brand { font-size: 28px; font-weight: 900; color: #0056b3; font-family: 'Outfit', sans-serif; }
            .print-report-type { font-size: 10px; font-weight: 900; color: #94a3b8; letter-spacing: 0.3em; margin-top: -5px; }
            
            .print-meta-table { width: 100% !important; border: none !important; margin-top: 30px; }
            .print-meta-table td { border: none !important; padding: 2px 0; font-size: 11px !important; }
            
            .print-footer { margin-top: auto; padding-top: 40px; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 9px; color: #94a3b8; font-style: italic; }
            .print-total-bar { margin-top: 30px; padding: 15px 25px; background: #0056b3 !important; color: white !important; font-size: 18px; font-weight: 900; text-align: right; border-radius: 4px; }
        }
    </style>
</head>
<body class="min-h-screen antialiased select-none overflow-x-hidden safe-area-inset">

    <div id="persistent-status" class="fixed top-0 left-0 right-0 z-[1000] hidden animate-in slide-in-from-top duration-700 backdrop-blur-3xl border-b border-primary/10 no-print"></div>

    <div id="app" class="flex min-h-screen pt-0 transition-all duration-500">
        <main id="view-container" class="flex-1 flex flex-col"></main>
    </div>

    <div id="modal-container" class="hidden fixed inset-0 z-[1500] bg-black/60 backdrop-blur-lg flex items-center justify-center p-6 animate-in fade-in duration-300 no-print"></div>
    <div id="toast-container" class="fixed bottom-10 right-10 z-[2000] flex flex-col gap-4 pointer-events-none no-print"></div>

    <!-- Hidden Print Container: Branded LEISTUNGSNACHWEIS -->
    <div id="print-report" class="hidden bg-white text-black min-h-screen p-10 flex flex-col">
        <div class="print-header">
            <div class="print-logo-box">
                <img id="logo-print" src="/logo.png" alt="SFM Logo">
            </div>
            <div class="print-brand">SFM WIEN</div>
            <div class="print-report-type uppercase">Leistungsnachweis</div>
            
            <table class="print-meta-table">
                <tr><td width="15%"><strong>OBJEKT:</strong></td><td id="p-report-location">-</td></tr>
                <tr><td><strong>KUNDE:</strong></td><td id="p-report-contact">-</td></tr>
                <tr><td><strong>ZEITRAUM:</strong></td><td id="p-report-period">-</td></tr>
            </table>
        </div>
        
        <div id="p-report-table-container"></div>
        
        <div id="p-report-total-box" class="print-total-bar italic uppercase">Gesamtstunden: 0.00 h</div>
        
        <div class="print-footer">
             <div>SFM Facility Services GmbH | Wienerbergstraße 11, AT-1100 Wien</div>
             <div>www.sfm-facility.at | service@sfm-facility.at</div>
        </div>
    </div>

    <!-- Scripts Module -->
    <script type="module" src="/config.js"></script>
    <script type="module" src="/supabase-client.js"></script>
    <script type="module" src="/data.js"></script>
    <script type="module" src="/app.js"></script>

</body>
</html>
