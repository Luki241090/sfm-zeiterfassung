<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SFM QR-Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --card: #ffffff;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 8px;
        }

        p {
            color: #64748b;
            margin-bottom: 40px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            width: 100%;
            max-width: 1200px;
        }

        .qr-card {
            background: var(--card);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .qr-container {
            margin-bottom: 16px;
            padding: 10px;
            background: white;
            border: 1px solid #e2e8f0;
        }

        .qr-label {
            font-weight: 600;
            font-size: 14px;
            color: #1e293b;
            margin-bottom: 4px;
        }

        .qr-addr {
            font-size: 12px;
            color: #64748b;
        }

        .actions {
            margin-bottom: 30px;
            display: flex;
            gap: 12px;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        @media print {
            body {
                padding: 0;
                background: white;
            }

            .actions,
            h1,
            p {
                display: none;
            }

            .grid {
                display: block;
            }

            .qr-card {
                break-inside: avoid;
                box-shadow: none;
                border: 1px solid #eee;
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <h1>SFM QR-Codes</h1>
    <p>Diese Codes können ausgedruckt und an den Objekten angebracht werden.</p>

    <div class="actions">
        <button onclick="window.print()">Drucken / Als PDF speichern</button>
        <button onclick="window.location.href='index.html'" style="background: #64748b;">Zurück zur App</button>
    </div>

    <div class="grid" id="qr-grid"></div>

    <script src="data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const grid = document.getElementById('qr-grid');
            const objects = Data.objects;

            Object.entries(objects).forEach(([id, obj]) => {
                const card = document.createElement('div');
                card.className = 'qr-card';

                // Format: ID|NAME|ADRESSE
                const qrValue = `${id}|${obj.name}|${obj.address}`;

                const label = document.createElement('div');
                label.className = 'qr-label';
                label.textContent = `${id} - ${obj.name}`;

                const addr = document.createElement('div');
                addr.className = 'qr-addr';
                addr.textContent = obj.address;

                const qrContainer = document.createElement('div');
                qrContainer.className = 'qr-container';
                qrContainer.id = `qr-${id}`;

                card.appendChild(qrContainer);
                card.appendChild(label);
                card.appendChild(addr);
                grid.appendChild(card);

                new QRCode(qrContainer, {
                    text: qrValue,
                    width: 200,
                    height: 200,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            });
        });
    </script>
</body>

</html>
